<!DOCTYPE html>
<html lang="pt-AO" data-profundidade="1">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alimentação Saudável — Vida Saudável Angola</title>
<meta name="description" content="Guias e artigos sobre alimentação saudável, adaptados à realidade angolana: ingredientes acessíveis, receitas e hábitos simples.">
<link rel="canonical" href="https://www.vidasaudavelangola.com/alimentacao-saudavel/index.html">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#1F7A4D">
<link rel="icon" href="../icons/favicon-32.png">
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<a href="#conteudo-principal" class="skip-link">Saltar para o conteúdo</a>
<div id="cabecalho-app"></div>

<main id="conteudo-principal">
  <nav aria-label="Localização" class="container" style="padding-top:16px;font-size:.82rem;color:var(--texto-suave);">
    <a href="../index.html">Início</a> / <span>Alimentação Saudável</span>
  </nav>

  <section class="hero" style="padding-top:20px;">
    <div class="container medida-texto">
      <span class="etiqueta">Categoria</span>
      <h1>Alimentação Saudável</h1>
      <p class="lead">Escolhas simples e acessíveis para o seu dia a dia, com ingredientes que encontra facilmente em Angola.</p>
    </div>
  </section>

  <section class="seccao container">
    <div class="lista-artigos" id="lista-artigos"></div>
  </section>
</main>

<div id="rodape-app"></div>
<script src="../assets/js/artigos-dados.js"></script>
<script src="../assets/js/main.js"></script>
<script>
(function () {
  var lista = document.getElementById("lista-artigos");
  var artigos = (window.ARTIGOS_VSA || []).filter(function (a) { return a.categoria === "alimentacao"; });
  if (!artigos.length) {
    lista.innerHTML = '<p style="color:var(--texto-suave);">Novos artigos desta categoria chegam em breve.</p>';
    return;
  }
  lista.innerHTML = artigos.map(function (a) {
    return '<a class="cartao-artigo" href="../blog/' + a.url + '">' +
      '<span class="miniatura"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2v20M6 2c0 4 4 4 4 8s-4 4-4 8M18 2v8a2 2 0 01-4 0V2"/></svg></span>' +
      '<span class="conteudo"><h3>' + a.titulo + '</h3><span class="meta"><span>' + a.tempoLeitura + ' de leitura</span></span></span></a>';
  }).join("");
})();
</script>
</body>
</html>
